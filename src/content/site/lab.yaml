name: "FORT Lab"
fullName: "Foundations of Robust and Trustworthy Algorithms for Machine Learning"

# Used as the default meta description and the hero subtitle
description: "Pursuing research in the analysis and design of algorithms for ensuring privacy, robustness, and fairness in machine learning and artificial intelligence. Our goal is to design algorithms for settings that are practical but not well investigated in research literature."

