name: "FORT Lab"
shortName: "FORT"
fullName: "Foundations of Robust and Trustworthy Algorithms for Machine Learning"

# Used as the default meta description and the hero subtitle
description: "Pursuing research in the analysis and design of algorithms for ensuring privacy, robustness, and fairness in machine learning and artificial intelligence. Our goal is to design algorithms for settings that are practical but not well investigated in research literature."

# ── Home page hero ────────────────────────────────────────────
hero:
  headline: "Foundations of Robust and Trustworthy Algorithms for Machine Learning"
  description: "Pursuing research in the analysis and design of algorithms for ensuring privacy, robustness, and fairness in machine learning and artificial intelligence."

# ── About page ────────────────────────────────────────────────
about:
  heroHeadline: "Our aim is to design algorithms for settings that are practical but not well investigated in research literature."
  mission: |
    The FORT Lab pursues fundamental research in the design and analysis of algorithms for robust and trustworthy machine learning. We focus on problems where principled algorithmic solutions can make AI systems safer, fairer, and more reliable in practice.

    Our work spans privacy-preserving learning, algorithmic fairness, and robust decision-making under uncertainty — with applications in recommendation systems, healthcare, and beyond.

# ── Research areas (shown on the About page) ──────────────────
researchAreas:
  - name: "Privacy"
    description: "We develop algorithms that enable learning from data while preserving user privacy, ensuring strong guarantees even in complex and dynamic settings."
  - name: "Robustness"
    description: "We design methods that remain reliable under uncertainty, distribution shifts, and real-world variability, with a focus on stability and performance."
  - name: "Fairness"
    description: "We study algorithmic approaches to promote equitable outcomes and mitigate bias, particularly in long-term and decision-making systems."

